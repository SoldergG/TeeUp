name: TeeUp
options:
  bundleIdPrefix: com.teeup
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "TeeUp precisa da tua localização para mostrar campos de golfe perto de ti."

targets:
  TeeUp:
    type: application
    platform: iOS
    sources:
      - TeeUp
    entitlements:
      path: TeeUp/TeeUp.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: TeeUp/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.solderg.teeup
            CFBundleURLSchemes:
              - teeup
        CFBundleDisplayName: TeeUp
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: TeeUp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.solderg.teeup
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: TeeUp/TeeUp.entitlements
